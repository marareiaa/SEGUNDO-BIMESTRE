<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .bg-copa {
            background-image: url('img/FIFA-World-Cup-26.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card {
            backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        #Cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>

<body>

<div class="bg-copa">

    <div id="Cards">

        <div class="card" style="width: 22rem;">
            <img src="img/_vinicius_junior.png" class="card-img-top">

            <div class="card-body">
                <h5 class="card-title">
                    Vini Jr.
                    <span class="badge text-bg-secondary">9,5</span>
                </h5>

                <p class="card-text">
                    <strong>Nome:</strong> Vinícius José Paixão de Oliveira Júnior<br>
                    <strong>Nascimento:</strong> 12/07/2000<br>
                    <strong>Altura:</strong> 1,76 m<br>
                    <strong>Posição:</strong> Ponta-esquerda / Atacante
                </p>
            </div>
        </div>

    </div>

    <div class="text-center mt-4">
        <button onclick="add()" class="btn btn-primary">
            Adicionar Novo Jogador
        </button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
